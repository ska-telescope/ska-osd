# Default values for osd.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
minikube: true

system: ost
subsystem: osd
validation_strictness: 2
push_to_gitlab: 1

labels:
  app: ska-ost-osd

global:
  minikube: true
  cluster_domain: techops.internal.skao.int
  id_rsa:
  aws_server_bucket_name:
  aws_server_public_key:
  aws_server_secret_key:
  aws_server_bucket_region:
  jira_access_token:
  jira_api_url:

rest:
  component: rest
  function: backend
  domain: operations
  production: false
  logLevel: INFO
  enabled: true
  image:
    registry: artefact.skao.int
    image: ska-ost-osd
    tag: ~ # Defaults to the chart appVersion if not set
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 1024Mi
    limits:
      cpu: 1000m
      memory: 1024Mi
  ingress:
    enabled: true

nodeSelector: {}

affinity: {}

tolerations: []


secretProvider:
  enabled: true
  provider:
    name: "vault"
    vaultAddress: "https://vault.skao.int"
    roleName: "kube-role"
    secretsPath: "kv/data/users/dayanand_arade/gitlab_ssh_key"
    secrets:
    - secretKey: "id_rsa"
      targetEnv: ID_RSA

existingSltClientSecret: # This is used for deployments where Secrets are managed externally, e.g. Low ITF
  name: ~
  key: ~

vaultStaticSecret:
  enabled: true
  mount: "kv"
  path: "users/dayanand_arade/s3_bucket"
  refreshAfter: 60s
  secrets:
    - secretKey: aws_server_bucket_name
      targetEnv: AWS_SERVER_BUCKET_NAME
    - secretKey: aws_server_public_key
      targetEnv: AWS_SERVER_PUBLIC_KEY
    - secretKey: aws_server_secret_key
      targetEnv: AWS_SERVER_SECRET_KEY
    - secretKey: aws_server_bucket_region
      targetEnv: AWS_SERVER_BUCKET_REGION
    - secretKey: jira_access_token
      targetEnv: JIRA_ACCESS_TOKEN
    - secretKey: jira_api_url
      targetEnv: JIRA_API_URL
